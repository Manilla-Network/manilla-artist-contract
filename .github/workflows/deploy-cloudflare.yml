name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (TanStack Start → Cloudflare)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      # Deploys the built output to Cloudflare Pages.
      # Project is auto-created on first run if it doesn't exist.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=manilla-contract --branch=main
        env:
          # Runtime secrets used by server functions (Resend + Supabase admin + audit emails)
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      # Push runtime secrets to the Cloudflare Pages project so server functions
      # (running on Cloudflare Workers) can read them via process.env.
      - name: Sync runtime secrets to Cloudflare Pages
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
        run: |
          set -e
          put_secret () {
            local name="$1"; local value="$2"
            if [ -z "$value" ]; then echo "skip $name (empty)"; return; fi
            echo "$value" | bunx wrangler pages secret put "$name" \
              --project-name=manilla-contract
          }
          put_secret RESEND_API_KEY        "${{ secrets.RESEND_API_KEY }}"
          put_secret RESEND_FROM           "${{ secrets.RESEND_FROM }}"
          put_secret ADMIN_EMAIL           "${{ secrets.ADMIN_EMAIL }}"
          put_secret SUPABASE_URL          "${{ secrets.SUPABASE_URL }}"
          put_secret SUPABASE_SERVICE_ROLE_KEY "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          put_secret SUPABASE_PUBLISHABLE_KEY  "${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
